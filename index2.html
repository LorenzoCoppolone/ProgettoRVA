<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Frame 360° Panorama</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <script>
    // Componente custom: al click reindirizza a un'altra pagina
    AFRAME.registerComponent('link-to', {
      schema: { type: 'string', default: '' },
      init: function () {
        this.el.addEventListener('click', () => {
          window.location.href = this.data;
        });
      }
    });
  </script>
```
 
</head>
<body>

    <a-scene>
        <!-- Sky con immagine 360°-->
        <a-sky src="img/InternoSantuarioNuovo.jpg" rotation="0 0 0"></a-sky>

         <!-- Camera + cursor per guardarsi intorno -->
      <a-entity camera look-controls wasd-controls>
        <a-entity 
          cursor="fuse: true; fuseTimeout: 1000"
          position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
          material="color: white; shader: flat">
        </a-entity>
      </a-entity>

    


         <!-- ═══ PORTALE verso Sala 2 ═══ -->
    <a-entity
      position="2 1.4 -3.5"
      link-to="index.html">

      <!-- Anello visivo del portale -->
      <a-torus
        color="#00CFFF"
        radius="0.8"
        radius-tubular="0.05"
        animation="property: rotation; loop: true; dur: 4000; easing: linear"
        opacity="0">
      </a-torus>

      <a-plane
        position="0 0 -0.1"
        width="1.5"
        height="1.5"
        color="#00CFFF"
        opacity="0">

      </a-plane>

      <!-- Etichetta testuale -->
      <a-text
        value="→ GUARDA QUI PER 
        TORNARE ALL'ESTERNO"
        align="center"
        color="white"
        position="0 0 0.1"
        width="8">
      </a-text>

    </a-entity>

     <a-entity
      position="-2 1.4 -3.5"
      link-to="index3.html">

      <!-- Anello visivo del portale -->
      <a-torus
        color="#00CFFF"
        radius="0.8"
        radius-tubular="0.05"
        animation="property: rotation; loop: true; dur: 4000; easing: linear"
        opacity="0">
      </a-torus>

      <a-plane
        position="0 0 -0.1"
        width="1.5"
        height="1.5"
        color="#00CFFF"
        opacity="0">

      </a-plane>

      <!-- Etichetta testuale -->
      <a-text
        value="→ GUARDA QUI PER 
        ANDARE ALLA CRIPTA"
        align="center"
        color="white"
        position="0 0 0.1"
        width="8">
      </a-text>

    </a-entity>

    <!-- Copyright -->
    <a-text
      value="© Immagine di: Massimiliano Nibid"
      position="3.5 -1.8 -4"
      rotation="0 0 0"
      scale="0.5 0.5 0.5"
      align="right"
      color="#FFFFFF"
      font="kelsonsans">
    </a-text>

    </a-scene>
</body>
</html>
